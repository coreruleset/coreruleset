---
meta:
  author: "Christian S.J. Peron"
  description: None
  enabled: true
  name: 941320.yaml
tests:
  - test_title: 941320-1
    desc: "XSS Attack - HTML Tag Handler"
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            headers:
              Host: localhost
            method: POST
            port: 80
            data: "var=<noscript#"
            version: HTTP/1.0
          output:
            log_contains: id "941320"
  - test_title: 941320-2
    desc: 'GHSA: 941320 payload via XML attribute injection (verifies XML://@* coverage)'
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            method: POST
            port: 80
            headers:
              User-Agent: ModSecurity CRS 3 Tests
              Host: localhost
              Content-Type: 'application/xml'
            uri: '/'
            data: '<?xml version="1.0"?><root><a probe="&lt;noscript#"></a></root>'
          output:
            log_contains: id "941320"
