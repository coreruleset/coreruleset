---
meta:
  author: "Christian S.J. Peron"
  description: None
  enabled: true
  name: 941120.yaml
tests:
  - test_title: 941120-1
    desc: "XSS Filter - Category 2: Event Handler Vector"
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            headers:
              Host: localhost
            method: POST
            port: 80
            uri: "/?%20%20onload%3d%20=vardata"
            version: HTTP/1.0
          output:
            log_contains: id "941120"
  - test_title: 941120-2
    desc: 'GHSA: 941120 payload via XML attribute injection (verifies XML://@* coverage)'
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            method: POST
            port: 80
            headers:
              User-Agent: ModSecurity CRS 3 Tests
              Host: localhost
              Content-Type: 'application/xml'
            uri: '/'
            data: '<?xml version="1.0"?><root><a probe="  onload= "></a></root>'
          output:
            log_contains: id "941120"
