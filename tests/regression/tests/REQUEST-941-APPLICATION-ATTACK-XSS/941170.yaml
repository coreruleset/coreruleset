---
meta:
  author: "csanders-git, azurit, Esad Cetiner"
rule_id: 941170
tests:
  - test_id: 1
    desc: XSS in XML Test as described in http://www.client9.com/article/five-interesting-injection-attacks/
    stages:
      - input:
          dest_addr: 127.0.0.1
          method: GET
          port: 80
          uri: "/get/char_test?mime=text/xml&body=%3Cx:script%20xmlns:x=%22http://www.w3.org/1999/xhtml%22%20src=%22data:,alert(1)%22%20/%3E"
          headers:
            User-Agent: "OWASP CRS test agent"
            Host: localhost
            Accept: text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5
          version: "HTTP/1.1"
        output:
          log:
            expect_ids: [941170]
  - test_id: 2
    desc: "XSS test based on portswigger XSS cheatsheet"
    stages:
      - input:
          dest_addr: 127.0.0.1
          method: POST
          port: 80
          headers:
            User-Agent: "OWASP CRS test agent"
            Host: localhost
            Accept: text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5
          uri: "/post"
          data: "payload=javascript:/*--></title></style></textarea></script></xmp><svg/onload='+/\"/+/onmouseover=1/+/[*/[]/+alert(1)//'></a>"
          version: "HTTP/1.1"
        output:
          log:
            expect_ids: [941170]
  - test_id: 3
    desc: 'Test first backslash match (javascript:(?:[\s\S]+[=\x5c\(\[\.<]) with: javascript: \\\\t (extra backslashes to work around rule transformations)'
    stages:
      - input:
          dest_addr: 127.0.0.1
          method: GET
          port: 80
          uri: "/get?var=javascript:%20%5C%5C%5C%5Ct"
          headers:
            Accept: "*/*"
            User-Agent: "OWASP CRS test agent"
            Host: localhost
          version: "HTTP/1.1"
        output:
          log:
            expect_ids: [941170]
  - test_id: 4
    desc: 'Test second backslash match (javascript:(?:...|\x5c[ux]\d)) with: javascript:\\\\u0020 (extra backslashes to work around rule transformations)'
    stages:
      - input:
          dest_addr: 127.0.0.1
          method: GET
          port: 80
          uri: "/get?var=javascript:%5C%5C%5C%5Cu0020"
          headers:
            Accept: "*/*"
            User-Agent: "OWASP CRS test agent"
            Host: localhost
          version: "HTTP/1.1"
        output:
          log:
            expect_ids: [941170]
  - test_id: 5
    desc: "Status Page Test -  data: , <x> as GET variable"
    stages:
      - input:
          dest_addr: 127.0.0.1
          method: GET
          port: 80
          uri: "/get?test=%20data%3A%20%2C%20%3Cx%3E"
          headers:
            Accept: "*/*"
            User-Agent: "OWASP CRS test agent"
            Host: localhost
          version: "HTTP/1.1"
        output:
          log:
            expect_ids: [941170]
  - test_id: 6
    desc: "CSS -moz-binding attribute injection (covers the moz-binding branch)"
    stages:
      - input:
          dest_addr: 127.0.0.1
          method: GET
          port: 80
          uri: "/get?style=-moz-binding%3Aurl%28http%3A%2F%2Fexample.com%2Fxss.xml%23xss%29"
          headers:
            Accept: "*/*"
            User-Agent: "OWASP CRS test agent"
            Host: localhost
          version: "HTTP/1.1"
        output:
          log:
            expect_ids: [941170]
  - test_id: 7
    desc: |
      Note: This is not a real attack, this test is to just test for 4RI-250413
      4RI-250413
    stages:
      - input:
          dest_addr: 127.0.0.1
          method: POST
          port: 80
          uri: "/"
          data: |
            { "javascript:a=:,":"foo" }
          headers:
            Accept: "*/*"
            User-Agent: "OWASP CRS test agent"
            Host: localhost
            Content-Type: application/json
          version: "HTTP/1.1"
        output:
          log:
            expect_ids: [941170]
  - test_id: 8
    desc: 'GHSA: 941170 payload via XML attribute injection (verifies XML://@* coverage)'
    stages:
      - input:
          dest_addr: 127.0.0.1
          method: POST
          port: 80
          headers:
            User-Agent: 'OWASP CRS test agent'
            Host: 'localhost'
            Content-Type: 'application/xml'
          uri: '/post'
          data: '<?xml version="1.0"?><root><a probe="&lt;x:script xmlns:x=&quot;http://www.w3.org/1999/xhtml&quot; src=&quot;data:,alert(1)&quot; /&gt;"></a></root>'
          version: 'HTTP/1.1'
        output:
          log:
            expect_ids: [941170]
