---
meta:
  author: "Christian S.J. Peron"
  description: None
  enabled: true
  name: 941240.yaml
tests:
  - test_title: 941240-1
    desc: "IE XSS Filters"
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            headers:
              Host: localhost
            method: GET
            port: 80
            uri: "/?var=%3c%3fimport%20implementation%20%3d"
            version: HTTP/1.0
          output:
            log_contains: id "941240"
  - test_title: 941240-2
    desc: 'GHSA: 941240 payload via XML attribute injection (verifies XML://@* coverage)'
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            method: POST
            port: 80
            headers:
              User-Agent: ModSecurity CRS 3 Tests
              Host: localhost
              Content-Type: 'application/xml'
            uri: '/'
            data: '<?xml version="1.0"?><root><a probe="&lt;?import implementation ="></a></root>'
          output:
            log_contains: id "941240"
