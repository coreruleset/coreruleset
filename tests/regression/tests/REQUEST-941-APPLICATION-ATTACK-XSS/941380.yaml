---
meta:
  author: "Franziska Buehler, azurit"
rule_id: 941380
tests:
  - test_id: 1
    desc: "AngularJS client side template injection detection"
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Host: localhost
            Accept: "text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5"
            User-Agent: "OWASP CRS test agent"
          method: GET
          port: 80
          uri: "/get/login?user=%20x%20%7B%7Bconstructor.constructor(%27alert(1)%27)()%7D%7D%20.%20ff"
          # /login?user={{constructor.constructor('alert(1)')()}}
          version: HTTP/1.1
        output:
          log:
            expect_ids: [941380]
  - test_id: 2
    desc: 'GHSA: 941380 payload via XML attribute injection (verifies XML://@* coverage)'
    stages:
      - input:
          dest_addr: 127.0.0.1
          method: POST
          port: 80
          headers:
            User-Agent: 'OWASP CRS test agent'
            Host: 'localhost'
            Content-Type: 'application/xml'
          uri: '/post'
          data: '<?xml version="1.0"?><root><a probe=" x &#x7B;&#x7B;constructor.constructor(''alert(1)'')()&#x7D;&#x7D; . ff"></a></root>'
          version: 'HTTP/1.1'
        output:
          log:
            expect_ids: [941380]
