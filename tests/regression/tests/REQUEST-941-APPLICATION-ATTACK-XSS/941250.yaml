---
meta:
  author: "Christian S.J. Peron"
  description: None
  enabled: true
  name: 941250.yaml
tests:
  - test_title: 941250-1
    desc: "IE XSS Filters"
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            headers:
              Host: localhost
            method: POST
            port: 80
            data: "var=<meta http-equiv=\"refresh\"&foo=var"
            version: HTTP/1.0
          output:
            log_contains: id "941250"
  - test_title: 941250-2
    desc: "XSS test based on portswigger XSS cheatsheet"
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            headers:
              Host: localhost
            method: POST
            port: 80
            data: "payload=<meta http-equiv=\"refresh\" content=\"0; http://evil?</a>"
            version: HTTP/1.0
          output:
            log_contains: id "941250"
  - test_title: 941250-3
    desc: 'GHSA: 941250 payload via XML attribute injection (verifies XML://@* coverage)'
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            method: POST
            port: 80
            headers:
              User-Agent: ModSecurity CRS 3 Tests
              Host: localhost
              Content-Type: 'application/xml'
            uri: '/'
            data: '<?xml version="1.0"?><root><a probe="&lt;meta http-equiv=&quot;refresh&quot;"></a></root>'
          output:
            log_contains: id "941250"
