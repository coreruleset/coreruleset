---
meta:
  author: "Christian S.J. Peron"
rule_id: 941220
tests:
  - test_id: 1
    desc: "IE XSS Filters"
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Host: localhost
            User-Agent: "OWASP CRS test agent"
            Accept: "*/*"
          method: POST
          uri: "/post"
          port: 80
          data: "var=v%26newline;b%26tab;s%26newline;c%26newline;r%26tab;i%26tab;p%26newline;t%26colon;:&var2=whatever"
          version: HTTP/1.1
        output:
          log:
            expect_ids: [941220]
  - test_id: 2
    desc: "XSS test based on portswigger XSS cheatsheet"
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Host: localhost
            User-Agent: "OWASP CRS test agent"
            Accept: "*/*"
          method: POST
          uri: "/post"
          port: 80
          data: "payload=<a href=\"vbscript:MsgBox+1\">XSS</a>"
          version: HTTP/1.1
        output:
          log:
            expect_ids: [941220]
  - test_id: 3
    desc: 'GHSA: 941220 payload via XML attribute injection (verifies XML://@* coverage)'
    stages:
      - input:
          dest_addr: 127.0.0.1
          method: POST
          port: 80
          headers:
            User-Agent: 'OWASP CRS test agent'
            Host: 'localhost'
            Content-Type: 'application/xml'
          uri: '/post'
          data: '<?xml version="1.0"?><root><a probe="v&amp;newline;b&amp;tab;s&amp;newline;c&amp;newline;r&amp;tab;i&amp;tab;p&amp;newline;t&amp;colon;:"></a></root>'
          version: 'HTTP/1.1'
        output:
          log:
            expect_ids: [941220]
