---
meta:
  author: "karelorigin, azurit"
rule_id: 934150
tests:
  - test_id: 1
    desc: Ruby injection test
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Accept: "*/*"
            Host: localhost
            User-Agent: "OWASP CRS test agent"
          method: GET
          port: 80
          uri: "/get?x=Process.spawn(%22id%22)"
          version: HTTP/1.1
        output:
          log:
            expect_ids: [934150]
  - test_id: 2
    desc: 'GHSA: 934150 payload via XML attribute injection (verifies XML://@* coverage)'
    stages:
      - input:
          dest_addr: 127.0.0.1
          method: POST
          port: 80
          headers:
            User-Agent: 'OWASP CRS test agent'
            Host: 'localhost'
            Content-Type: 'application/xml'
          uri: '/post'
          data: '<?xml version="1.0"?><root><a probe="Process.spawn(&quot;id&quot;)"></a></root>'
          version: 'HTTP/1.1'
        output:
          log:
            expect_ids: [934150]
