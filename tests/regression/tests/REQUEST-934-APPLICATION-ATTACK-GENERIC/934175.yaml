---
meta:
  author: "zoutjebot"
rule_id: 934175
tests:
  - test_id: 1
    desc: "Positive test: Jinja2/Twig SSTI with arithmetic"
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Host: localhost
            User-Agent: "OWASP CRS test agent"
            Accept: text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5
          method: GET
          port: 80
          uri: "/search?q={{7*7}}"
          version: HTTP/1.1
        output:
          log:
            expect_ids: [934175]
