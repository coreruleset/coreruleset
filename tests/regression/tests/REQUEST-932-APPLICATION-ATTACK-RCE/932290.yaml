---
meta:
  author: "Xhoenix"
rule_id: 932290
tests:
  - test_id: 1
    desc: "Bash Quote evasion - 'i'fconfig"
    stages:
      - input:
          dest_addr: "127.0.0.1"
          method: "GET"
          port: 80
          headers:
            User-Agent: "OWASP CRS test agent"
            Host: "localhost"
            Accept: text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5
          uri: "/get?932290-1=%27i%27fconfig"
          version: "HTTP/1.1"
        output:
          log:
            expect_ids: [932290]
