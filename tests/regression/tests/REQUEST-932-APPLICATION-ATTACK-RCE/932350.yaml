---
meta:
  author: "Esad Cetiner, Max Leske"
rule_id: 932350
tests:
  - test_id: 1
    desc: |
      Block execution of `id` command
      `id` is a very common parameter name so we only block at PL-3
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Accept: "text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5"
            Host: localhost
            User-Agent: "OWASP CRS test agent"
          method: POST
          port: 80
          uri: "/post"
          data: "id=4"
          version: HTTP/1.1
        output:
          log:
            expect_ids: [932350]
  - test_id: 2
    desc: |
      Block execution of `id` command
      `id` is a very common parameter name so we only block at PL-3
    stages:
      - input:
          dest_addr: "127.0.0.1"
          method: "GET"
          port: 80
          headers:
            User-Agent: "OWASP CRS test agent"
            Referer: id
            Host: "localhost"
            Accept: text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5
          uri: "/get"
          version: HTTP/1.1
        output:
          log:
            expect_ids: [932350]
  - test_id: 3
    desc: |
      Block execution of `id` command
      `id` is a very common parameter name so we only block at PL-3
    stages:
      - input:
          dest_addr: "127.0.0.1"
          method: "GET"
          port: 80
          headers:
            User-Agent: id
            Host: "localhost"
            Accept: text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5
          uri: "/get"
          version: HTTP/1.1
        output:
          log:
            expect_ids: [932350]
  - test_id: 4
    desc: RCE ;top with html entities two digit decimal of 59 (;)
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Host: localhost
            User-Agent: "OWASP CRS test agent"
            Accept: text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5
            Accept-Encoding: gzip, deflate, br
            Accept-Language: pl-PL,pl;q=0.9,en-US;q=0.8,en;q=0.7
            Content-Type: application/x-www-form-urlencoded
          method: POST
          port: 80
          uri: "/post"
          data: "arg=%26%2359%3B+;top"
          version: HTTP/1.1
        output:
          log:
            expect_ids: [932350]
  - test_id: 5
    desc: |
      RCE ;top with html entities two digit decimal of 59 (;)
      4RI-250413
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Host: localhost
            User-Agent: "OWASP CRS test agent"
            Accept: text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5
            Accept-Encoding: gzip, deflate, br
            Accept-Language: pl-PL,pl;q=0.9,en-US;q=0.8,en;q=0.7
            Content-Type: application/json
          method: POST
          port: 80
          uri: "/post"
          data: '{ ";top":"foo" }'
          version: HTTP/1.1
        output:
          log:
            expect_ids: [932350]
  - test_id: 6
    desc: 'GHSA: 932350 payload via XML attribute injection (verifies XML://@* coverage)'
    stages:
      - input:
          dest_addr: 127.0.0.1
          method: POST
          port: 80
          headers:
            User-Agent: 'OWASP CRS test agent'
            Host: 'localhost'
            Content-Type: 'application/xml'
          uri: '/post'
          data: '<?xml version="1.0"?><root><a probe="id"></a></root>'
          version: 'HTTP/1.1'
        output:
          log:
            expect_ids: [932350]
  - test_id: 7
    desc: |
      Block execution of `id` command in single quote
      `id` is a very common parameter name so we only block at PL-3
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Accept: "text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5"
            Host: localhost
            User-Agent: "OWASP CRS test agent"
          method: POST
          port: 80
          uri: "/post"
          data: "code='id'"
          version: HTTP/1.1
        output:
          log:
            expect_ids: [932350]
  - test_id: 8
    desc: |
      Block execution of `id` command in quotes
      `id` is a very common parameter name so we only block at PL-3
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Accept: "text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5"
            Host: localhost
            User-Agent: "OWASP CRS test agent"
          method: POST
          port: 80
          uri: "/post"
          data: "code=%22id%22"
          version: HTTP/1.1
        output:
          log:
            expect_ids: [932350]
  - test_id: 9
    desc: Don't match on non-command word quotes
    stages:
      - input:
          dest_addr: "127.0.0.1"
          method: "POST"
          port: 80
          headers:
            User-Agent: "OWASP CRS test agent"
            Host: "localhost"
            Accept: text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,ima>
          data: 'arg=;"aaaaaaaaaaaaaaaa"'
          version: "HTTP/1.1"
        output:
          log:
            no_expect_ids: [932350]
  - test_id: 10
    desc: Don't match on non-command word in single quote
    stages:
      - input:
          dest_addr: "127.0.0.1"
          method: "POST"
          port: 80
          headers:
            User-Agent: "OWASP CRS test agent"
            Host: "localhost"
            Accept: text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,ima>
          data: "arg=;'aaaaaaaaaaaaaaaa'"
          version: "HTTP/1.1"
        output:
          log:
            no_expect_ids: [932350]
  - test_id: 11
    desc: |
      Don't match on natural english sentences in quotes
      ;"The quick brown fox jumped over the lazy dog"
    stages:
      - input:
          dest_addr: "127.0.0.1"
          method: "POST"
          port: 80
          headers:
            User-Agent: "OWASP CRS test agent"
            Host: "localhost"
