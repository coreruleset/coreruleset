---
meta:
  author: "karelorigin, azurit"
  description: "Remote Command Execution: Unix shell history invocation"
rule_id: 932330
tests:
  - test_id: 1
    desc: "Unix shell history invocation: relative position"
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Accept: "text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5"
            Host: "localhost"
            User-Agent: "OWASP CRS test agent"
          method: GET
          port: 80
          uri: "/get?rce=!-1!-2"
          version: HTTP/1.1
        output:
          log:
            expect_ids: [932330]
  - test_id: 2
    desc: 'GHSA: 932330 payload via XML attribute injection (verifies XML://@* coverage)'
    stages:
      - input:
          dest_addr: 127.0.0.1
          method: POST
          port: 80
          headers:
            User-Agent: 'OWASP CRS test agent'
            Host: 'localhost'
            Content-Type: 'application/xml'
          uri: '/post'
          data: '<?xml version="1.0"?><root><a probe="!-1!-2"></a></root>'
          version: 'HTTP/1.1'
        output:
          log:
            expect_ids: [932330]
  - test_id: 3
    desc: "Negation pattern preceded by alphanumeric character should not trigger (FP test)"
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Accept: "text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5"
            Host: "localhost"
            User-Agent: "OWASP CRS test agent"
          method: GET
          port: 80
          uri: "/get?param=abc!-1"
          version: HTTP/1.1
        output:
          log:
            no_expect_ids: [932330]
  - test_id: 4
    desc: "Negation pattern preceded by non-alphanumeric character should trigger"
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Accept: "text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5"
            Host: "localhost"
            User-Agent: "OWASP CRS test agent"
          method: GET
          port: 80
          uri: "/get?rce=;!-3"
          version: HTTP/1.1
        output:
          log:
            expect_ids: [932330]
  - test_id: 5
    desc: "Negation pattern at start of value should trigger (start-of-value boundary)"
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Accept: "text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5"
            Host: "localhost"
            User-Agent: "OWASP CRS test agent"
          method: GET
          port: 80
          uri: "/get?rce=!-5"
          version: HTTP/1.1
        output:
          log:
            expect_ids: [932330]
  - test_id: 6
    desc: "Negation pattern preceded by space should trigger"
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Accept: "text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5"
            Host: "localhost"
            User-Agent: "OWASP CRS test agent"
          method: GET
          port: 80
          uri: "/get?rce=foo+!-7"
          version: HTTP/1.1
        output:
          log:
            expect_ids: [932330]
  - test_id: 7
    desc: "Product code with underscore prefix should not trigger (FP test)"
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Accept: "text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5"
            Host: "localhost"
            User-Agent: "OWASP CRS test agent"
          method: GET
          port: 80
          uri: "/get?sku=SKU_!-1"
          version: HTTP/1.1
        output:
          log:
            no_expect_ids: [932330]
  - test_id: 8
    desc: "Negation pattern preceded by special character should trigger"
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Accept: "text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5"
            Host: "localhost"
            User-Agent: "OWASP CRS test agent"
          method: GET
          port: 80
          uri: "/get?rce=[!-2"
          version: HTTP/1.1
        output:
          log:
            expect_ids: [932330]
