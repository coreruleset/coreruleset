            User-Agent: "OWASP CRS test agent"
          method: POST
          port: 80
          uri: /
          data: "cmd=%3A%28%29%7B%3A%7C%3A%26%7D%3B%3A"
          version: "HTTP/1.1"
        output:
          log:
            expect_ids: [932390]
  - test_id: 6
    desc: "fork bomb in query string via GET"
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Accept: "*/*"
            Host: localhost
            User-Agent: "OWASP CRS test agent"
          method: GET
          port: 80
          uri: "/get?cmd=%3A%28%29%7B+%3A%7C%3A%26+%7D%3B%3A"
          version: "HTTP/1.1"
        output:
          log:
            expect_ids: [932390]
  - test_id: 7
