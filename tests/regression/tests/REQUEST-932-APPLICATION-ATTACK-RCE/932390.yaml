---
meta:
  author: "fzipitria"
  description: "Shell fork bomb detection"
rule_id: 932390
tests:
  - test_id: 1
    desc: "classic fork bomb with colon function name"
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Accept: "*/*"
            Host: localhost
            User-Agent: "OWASP CRS test agent"
          method: POST
          port: 80
          uri: /
          data: "cmd=%3A%28%29%7B+%3A%7C%3A%26+%7D%3B%3A"
          version: "HTTP/1.1"
        output:
          log:
            expect_ids: [932390]
  - test_id: 2
    desc: "fork bomb with single letter function name"
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Accept: "*/*"
            Host: localhost
            User-Agent: "OWASP CRS test agent"
          method: POST
          port: 80
          uri: /
          data: "cmd=f%28%29%7B+f%7Cf%26+%7D%3Bf"
          version: "HTTP/1.1"
        output:
          log:
            expect_ids: [932390]
  - test_id: 3
    desc: "fork bomb with word function name and spaces"
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Accept: "*/*"
            Host: localhost
            User-Agent: "OWASP CRS test agent"
          method: POST
          port: 80
          uri: /
          data: "cmd=test%28%29+%7B+test+%7C+test+%26+%7D+test"
          version: "HTTP/1.1"
        output:
          log:
            expect_ids: [932390]
  - test_id: 4
    desc: "fork bomb with dot function name (bash source builtin)"
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Accept: "*/*"
            Host: localhost
            User-Agent: "OWASP CRS test agent"
          method: POST
          port: 80
