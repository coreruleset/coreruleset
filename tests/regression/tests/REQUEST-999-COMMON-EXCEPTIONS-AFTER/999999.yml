      Snapchat bot
      Known FP: 932237 blocks snapchat user-agent
    stages:
      - input:
          dest_addr: "127.0.0.1"
          headers:
            Accept: "*/*"
            User-Agent: "Snap URL Preview Service; bot; snapchat; https://developers.snap.com/robots"
            Host: "localhost"
          method: "GET"
          port: 80
          uri: "/get"
          version: "HTTP/1.1"
        output:
          log:
            expect_ids: [932237]
            # no_match_regex: \[id "\d+"\]
  - test_id: 37
    desc: "Links2 Browser on Linux"
    stages:
      - input:
          dest_addr: "127.0.0.1"
          headers:
            Accept: "*/*"
            User-Agent: "Links (2.3pre1; Linux 2.6.38-8-generic x86_64; 170x48)"
            Host: "localhost"
          method: "GET"
          port: 80
          uri: "/get"
          version: "HTTP/1.1"
        output:
          log:
            no_match_regex: \[id "\d+"\]
