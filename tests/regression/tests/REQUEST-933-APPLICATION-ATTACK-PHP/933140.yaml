---
meta:
  author: "Christian S.J. Peron"
  description: None
  enabled: true
  name: 933140.yaml
tests:
  - test_title: 933140-1
    desc: "PHP Injection Attack: I/O Stream"
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            headers:
              Host: "localhost"
              Cache-Control: "no-cache, no-store, must-revalidate"
            method: POST
            port: 80
            data: "var=php://stdout"
            version: HTTP/1.0
          output:
            log_contains: id "933140"
  - test_title: 933140-2
    desc: 'GHSA: 933140 payload via XML attribute injection (verifies XML://@* coverage)'
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            method: POST
            port: 80
            headers:
              User-Agent: ModSecurity CRS 3 Tests
              Host: localhost
              Content-Type: 'application/xml'
            uri: '/'
            data: '<?xml version="1.0"?><root><a probe="php://stdout"></a></root>'
          output:
            log_contains: id "933140"
