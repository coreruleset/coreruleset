---
meta:
  author: "NiceYouKnow, azurit"
rule_id: 933190
tests:
  - test_id: 1
    desc: "PHP Injection Attack: PHP Closing Tag Found"
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Host: "localhost"
            Cache-Control: "no-cache, no-store, must-revalidate"
            User-Agent: "OWASP CRS test agent"
            Accept: text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5
          method: POST
          port: 80
          uri: "/post"
          data: 'file_test=<?php%20@eval($_POST["hacker"]);%20?>&submit=1'
          version: HTTP/1.1
        output:
          log:
            expect_ids: [933190]
  - test_id: 2
    desc: 'GHSA: 933190 payload via XML attribute injection (verifies XML://@* coverage)'
    stages:
      - input:
          dest_addr: 127.0.0.1
          method: POST
          port: 80
          headers:
            User-Agent: 'OWASP CRS test agent'
            Host: 'localhost'
            Content-Type: 'application/xml'
          uri: '/post'
          data: '<?xml version="1.0"?><root><a probe="&lt;?php @eval($_POST[&quot;hacker&quot;]); ?&gt;"></a></root>'
          version: 'HTTP/1.1'
        output:
          log:
            expect_ids: [933190]
