---
meta:
  author: "Christian S.J. Peron"
  description: None
  enabled: true
  name: 933120.yaml
tests:
  - test_title: 933120-1
    desc: "PHP Injection Attack: Configuration Directive"
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            headers:
              Host: "localhost"
              Cache-Control: "no-cache, no-store, must-revalidate"
            method: POST
            port: 80
            data: "var=session.bug_compat_42%3dtrue"
            version: HTTP/1.0
          output:
            log_contains: id "933120"
  - test_title: 933120-2
    desc: 'GHSA: 933120 payload via XML attribute injection (verifies XML://@* coverage)'
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            method: POST
            port: 80
            headers:
              User-Agent: ModSecurity CRS 3 Tests
              Host: localhost
              Content-Type: 'application/xml'
            uri: '/'
            data: '<?xml version="1.0"?><root><a probe="session.bug_compat_42=true"></a></root>'
          output:
            log_contains: id "933120"
