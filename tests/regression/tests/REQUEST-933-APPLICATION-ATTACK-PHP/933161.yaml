  - test_id: 5
    desc: ucfirst()
    stages:
      - input:
          data: gethostbynamE(
          dest_addr: 127.0.0.1
          headers:
            Host: localhost
            User-Agent: "OWASP CRS test agent"
            Accept: text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5
          method: POST
          port: 80
          uri: "/post?foo=xucfirst%28%29"
          version: "HTTP/1.1"
        output:
          log:
            no_expect_ids: [933161]
  - test_id: 6
    desc: "block comment between function name and parens: checkdate/*x*/()"
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Host: localhost
            User-Agent: "OWASP CRS test agent"
            Accept: "*/*"
          method: GET
          port: 80
          uri: "/get?foo=checkdate%2f%2ax%2a%2f%28%29"
          version: "HTTP/1.1"
        output:
          log:
            expect_ids: [933161]
  - test_id: 7
    desc: "// line comment terminated by a newline before parens: symlink//c\\n()"
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Host: localhost
            User-Agent: "OWASP CRS test agent"
            Accept: "*/*"
