  - test_id: 3
    desc: symlink \t()
    stages:
      - input:
          data: gethostbynamE(
          dest_addr: 127.0.0.1
          headers:
            Host: localhost
            User-Agent: "OWASP CRS test agent"
            Accept: text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5
          method: POST
          port: 80
          uri: "/post?foo=symlink%09%28%29"
          version: "HTTP/1.1"
        output:
          log:
            expect_ids: [933161]
