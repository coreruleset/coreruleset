---
meta:
  author: "Etienne Munnich"
  description: "Restricted AI artifact access"
rule_id: 930140
tests:
  - test_id: 1
    desc: "Block access to .claude/ directory"
    stages:
      - input:
          dest_addr: "127.0.0.1"
          method: "GET"
          port: 80
          headers:
            User-Agent: "OWASP CRS test agent"
            Host: "localhost"
            Accept: text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5
          uri: "/.claude/settings.json"
          version: "HTTP/1.1"
        output:
          log:
            expect_ids: [930140]
