---
meta:
  author: "Christian S.J. Peron"
  description: None
  enabled: true
  name: 942280.yaml
tests:
  - test_title: 942280-1
    desc: "Postgres pg_sleep injection, waitfor delay attacks and database shutdown attempts"
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            headers:
              Host: localhost
            method: GET
            port: 80
            uri: "/?var=select%20pg_sleep"
            version: HTTP/1.0
          output:
            log_contains: id "942280"
  - test_title: 942280-2
    desc: 'GHSA: 942280 payload via XML attribute injection (verifies XML://@* coverage)'
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            method: POST
            port: 80
            headers:
              User-Agent: ModSecurity CRS 3 Tests
              Host: localhost
              Content-Type: 'application/xml'
            uri: '/'
            data: '<?xml version="1.0"?><root><a probe="select pg_sleep"></a></root>'
          output:
            log_contains: id "942280"
