---
meta:
  author: "Christian S.J. Peron"
  description: None
  enabled: true
  name: 942432.yaml
tests:
  - test_title: 942432-1
    desc: "Restricted SQL Character Anomaly Detection (args): # of special characters exceeded (2)"
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            headers:
              Host: localhost
            method: POST
            port: 80
            data: "var=;;dd foo bar"
            version: HTTP/1.0
          output:
            log_contains: id "942432"
  - test_title: 942432-2
    desc: 'GHSA: 942432 payload via XML attribute injection (verifies XML://@* coverage)'
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            method: POST
            port: 80
            headers:
              User-Agent: ModSecurity CRS 3 Tests
              Host: localhost
              Content-Type: 'application/xml'
            uri: '/'
            data: '<?xml version="1.0"?><root><a probe=";;dd foo bar"></a></root>'
          output:
            log_contains: id "942432"
