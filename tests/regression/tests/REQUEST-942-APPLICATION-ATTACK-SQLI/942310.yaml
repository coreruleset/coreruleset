---
meta:
  author: "Christian S.J. Peron"
  description: None
  enabled: true
  name: 942310.yaml
tests:
  - test_title: 942310-1
    desc: "chained SQL injection attempts 2/2"
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            headers:
              Host: localhost
            method: GET
            port: 80
            uri: "/?var=%22%27%20and%20%3d%20bar"
            version: HTTP/1.0
          output:
            log_contains: id "942310"
  - test_title: 942310-2
    desc: 'GHSA: 942310 payload via XML attribute injection (verifies XML://@* coverage)'
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            method: POST
            port: 80
            headers:
              User-Agent: ModSecurity CRS 3 Tests
              Host: localhost
              Content-Type: 'application/xml'
            uri: '/'
            data: '<?xml version="1.0"?><root><a probe="&quot;'' and = bar"></a></root>'
          output:
            log_contains: id "942310"
