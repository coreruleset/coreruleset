---
meta:
  author: "Christian S.J. Peron"
  description: None
  enabled: true
  name: 942250.yaml
tests:
  - test_title: 942250-1
    desc: "MATCH AGAINST, MERGE and EXECUTE IMMEDIATE injection"
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            headers:
              Host: localhost
            method: GET
            port: 80
            uri: "/?var=EXECUTE%20IMMEDIATE%20%22"
            version: HTTP/1.0
          output:
            log_contains: id "942250"
  - test_title: 942250-2
    desc: 'GHSA: 942250 payload via XML attribute injection (verifies XML://@* coverage)'
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            method: POST
            port: 80
            headers:
              User-Agent: ModSecurity CRS 3 Tests
              Host: localhost
              Content-Type: 'application/xml'
            uri: '/'
            data: '<?xml version="1.0"?><root><a probe="EXECUTE IMMEDIATE &quot;"></a></root>'
          output:
            log_contains: id "942250"
