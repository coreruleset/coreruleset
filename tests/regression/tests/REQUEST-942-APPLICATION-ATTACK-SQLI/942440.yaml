---
meta:
  author: "Christian S.J. Peron"
  description: None
  enabled: true
  name: 942440.yaml
tests:
  - test_title: 942440-1
    desc: "SQL Comment Sequence"
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            headers:
              Host: localhost
            method: GET
            port: 80
            uri: "/?var=DROP%20sampletable%3b--"
            version: HTTP/1.0
          output:
            log_contains: id "942440"
  - test_title: 942440-2
    desc: 'GHSA: 942440 payload via XML attribute injection (verifies XML://@* coverage)'
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            method: POST
            port: 80
            headers:
              User-Agent: ModSecurity CRS 3 Tests
              Host: localhost
              Content-Type: 'application/xml'
            uri: '/'
            data: '<?xml version="1.0"?><root><a probe="DROP sampletable;--"></a></root>'
          output:
            log_contains: id "942440"
