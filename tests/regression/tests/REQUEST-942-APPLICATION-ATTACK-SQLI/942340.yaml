  name: 942340.yaml
tests:
  - test_title: 942340-1
    desc: "basic SQL authentication bypass attempts 3/3"
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            headers:
              Host: localhost
            method: GET
            port: 80
            # in ( select * from
            uri: "/?var=in%20%28%20select%20%2a%20from"
            version: HTTP/1.0
          output:
            log_contains: id "942340"
  - test_title: 942340-2
    desc: 'GHSA: 942340 payload via XML attribute injection (verifies XML://@* coverage)'
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            method: POST
            port: 80
            headers:
              User-Agent: ModSecurity CRS 3 Tests
              Host: localhost
              Content-Type: 'application/xml'
            uri: '/'
            data: '<?xml version="1.0"?><root><a probe="in ( select * from"></a></root>'
          output:
            log_contains: id "942340"
