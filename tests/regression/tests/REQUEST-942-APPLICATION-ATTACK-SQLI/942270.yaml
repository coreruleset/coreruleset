---
meta:
  author: "Christian S.J. Peron"
  description: None
  enabled: true
  name: 942270.yaml
tests:
  - test_title: 942270-1
    desc: "basic sql injection. Common attack string for mysql, oracle and others"
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            headers:
              Host: localhost
            method: GET
            port: 80
            uri: "/?var=union%20select%20col%20from"
            version: HTTP/1.0
          output:
            log_contains: id "942270"
  - test_title: 942270-2
    desc: 'GHSA: 942270 payload via XML attribute injection (verifies XML://@* coverage)'
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            method: POST
            port: 80
            headers:
              User-Agent: ModSecurity CRS 3 Tests
              Host: localhost
              Content-Type: 'application/xml'
            uri: '/'
            data: '<?xml version="1.0"?><root><a probe="union select col from"></a></root>'
          output:
            log_contains: id "942270"
