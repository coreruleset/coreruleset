---
meta:
  author: "Christian S.J. Peron"
  description: None
  enabled: true
  name: 942110.yaml
tests:
  - test_title: 942110-1
    desc: "Common SQL Injection Testing"
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            headers:
              Host: localhost
            method: POST
            port: 80
            # NB: false positives: /?var=\'\'
            data: "var=%27%27"
            version: HTTP/1.0
          output:
            log_contains: id "942110"
  - test_title: 942110-2
    desc: 'GHSA: 942110 payload via XML attribute injection (verifies XML://@* coverage)'
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            method: POST
            port: 80
            headers:
              User-Agent: ModSecurity CRS 3 Tests
              Host: localhost
              Content-Type: 'application/xml'
            uri: '/'
            data: '<?xml version="1.0"?><root><a probe="''''"></a></root>'
          output:
            log_contains: id "942110"
