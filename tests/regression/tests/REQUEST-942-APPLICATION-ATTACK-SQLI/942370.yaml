  enabled: true
  name: 942370.yaml
tests:
  - test_title: 942370-1
    desc: "classic SQL injection probings 2/3"
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            headers:
              Host: localhost
            method: POST
            port: 80
            data: "var=\"` * 12344"
            version: HTTP/1.0
          output:
            log_contains: id "942370"
  - test_title: 942370-2
    desc: 'GHSA: 942370 payload via XML attribute injection (verifies XML://@* coverage)'
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            method: POST
            port: 80
            headers:
              User-Agent: ModSecurity CRS 3 Tests
              Host: localhost
              Content-Type: 'application/xml'
            uri: '/'
            data: '<?xml version="1.0"?><root><a probe="&quot;` * 12344"></a></root>'
          output:
            log_contains: id "942370"
