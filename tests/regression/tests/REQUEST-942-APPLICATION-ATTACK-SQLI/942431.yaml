meta:
  author: "Christian S.J. Peron"
  description: None
  enabled: true
  name: 942431.yaml
tests:
  - test_title: 942431-1
    desc: "Restricted SQL Character Anomaly Detection (args): # of special characters exceeded (6)"
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            headers:
              Host: localhost
            method: POST
            port: 80
            data: "var=-------------------&var2=whatever"
            version: HTTP/1.0
          output:
            log_contains: id "942431"
  - test_title: 942431-2
    desc: 'GHSA: 942431 payload via XML attribute injection (verifies XML://@* coverage)'
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            method: POST
            port: 80
            headers:
              User-Agent: ModSecurity CRS 3 Tests
              Host: localhost
              Content-Type: 'application/xml'
            uri: '/'
            data: '<?xml version="1.0"?><root><a probe="-------------------"></a></root>'
          output:
            log_contains: id "942431"
