---
meta:
  author: "Christian S.J. Peron, azurit"
rule_id: 942390
tests:
  - test_id: 1
    desc: "SQL Injection Attack"
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Host: localhost
            User-Agent: "OWASP CRS test agent"
            Accept: text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5
          method: GET
          port: 80
          uri: "/get?var=sdfsd%27or%201%20%3e%201"
          version: HTTP/1.1
        output:
          log:
            expect_ids: [942390]
  - test_id: 2
    desc: 'GHSA: 942390 payload via XML attribute injection (verifies XML://@* coverage)'
    stages:
      - input:
          dest_addr: 127.0.0.1
          method: POST
          port: 80
          headers:
            User-Agent: 'OWASP CRS test agent'
            Host: 'localhost'
            Content-Type: 'application/xml'
          uri: '/post'
          data: '<?xml version="1.0"?><root><a probe="sdfsd''or 1 &gt; 1"></a></root>'
          version: 'HTTP/1.1'
        output:
          log:
            expect_ids: [942390]
  - test_id: 3
    desc: "Positive test: quoted literal longer than 10 chars must still be caught (or 'aaaaaaaaaaaaaaaaaaaa' <)"
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Host: localhost
            User-Agent: "OWASP CRS test agent"
            Accept: "*/*"
          method: POST
          port: 80
          uri: "/post"
          data: "foo=%27%20or%20%27aaaaaaaaaaaaaaaaaaaa%27%20%3C"
          version: "HTTP/1.1"
        output:
          log:
            expect_ids: [942390]
  - test_id: 4
    desc: "Positive test: unquoted literal longer than 20 chars before a unary operator must still be caught"
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Host: localhost
            User-Agent: "OWASP CRS test agent"
            Accept: "*/*"
          method: POST
          port: 80
          uri: "/post"
          data: "foo=%27%20or%20aaaaaaaaaaaaaaaaaaaaaaaaa%3C"
          version: "HTTP/1.1"
        output:
          log:
            expect_ids: [942390]
