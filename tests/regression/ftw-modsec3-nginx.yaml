---
version: v0.0.0
meta:
  engine: libmodsecurity3
  platform: nginx
  annotations:
    - os: Debian Bullseye
    - purpose: CRS test suite
logfile: /logs/modsec3-nginx/error.log
mode: default
maxmarkerloglines: 2000
testoverride:
  input:
    dest_addr: modsec3-nginx
    port: 8080
  ignore:
    920100-4: "Nginx returns a 400 bad request"
    920100-8: |
      On Apache is not allowed to put a colon in the path.
      Nginx, on the other hand, allows it, in this case, returns a 200. /index.html:80?I=Like&Apples=Today#tag.
      Note that the colon is a legal character in a regular path segment, according to the RFC.
    920100-14: "Invalid request line produces a 400 Bad Request on Nginx. This prevents matching any rules."
    920100-16: "Seems like Nginx does a normalization of the request line, and if <schema>://<hostname> is sent (without a path) the request path becomes / by default"
    920181-1: "Nginx returns 400 if both Content-length and Transfer-Encoding chunked are present"
    920270-4: "Header host with null byte causes Apache to error before it gets to CRS. Nginx allow this and libModSecurity correctly matches the rule"
    920274-1: "Nginx will accept the value for the Host header, the rule should trigger"
    920290-4: "Nginx returns 400 if Host header is missing"
    920360-1: "Requires ARG_NAME_LENGTH to be set to an appropriately low value"
    920380-1: "Requires MAX_NUM_ARGS to be set to a sufficiently low value"
    920430-8: "If the HTTP Protocol Version is invalid, Nginx take action before modsecurity sending a 505 response code."
    920610-2: "nginx happily accepts fragments"
    920620-1: "nginx retains multiple separate Content-Type headers, which is what this rule is looking for"
    933110-3: "Nginx ignore by default request header with invalid characters (like X_Filename)"
