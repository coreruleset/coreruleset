name: Mark stale issues

on:
  schedule:
  - cron: "0 0 * * *"

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:

    runs-on: ubuntu-latest
    if: github.repository == 'coreruleset/coreruleset'

    steps:
    - uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899 # v10.3.0
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        stale-issue-message: 'This issue has been open 90 days waiting for feedback. Remove the stale label or comment, or this will be closed in 90 days'
        stale-issue-label: 'Stale issue'
        days-before-stale: 90
        days-before-close: 90
        only-issue-labels: ':hourglass_flowing_sand: awaiting feedback'
