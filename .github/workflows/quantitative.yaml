name: Quantitative tests

# Use the unprivileged `pull_request` trigger: this workflow checks out PR code
# (potentially from a fork), so it must NOT have access to write tokens or
# secrets. The companion workflow `quantitative-comment.yaml` runs on
# `workflow_run` after this completes and posts the PR comment with the
# elevated permissions required to write to PRs from forks.
on:
  pull_request:
    branches:
      - main
    paths:
      - 'rules/**'
      - '.github/workflows/quantitative.yaml'
  merge_group:

# Pin tool versions to prevent problems
env:
  GO_FTW_VERSION: '1.3.0'

permissions: {}
jobs:
  regression:
    runs-on: ubuntu-latest
    outputs:
      test_status: ${{ steps.quantitative.outcome }}
    strategy:
      matrix:
        language: ["eng"]
        year: ["2023"]
        size: ["10K"]
        paranoia_level: ["1"]
    permissions:
      contents: read
    steps:
      - name: "Checkout repo"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Checkout main repo"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: coreruleset/coreruleset
          ref: 'main'
          path: 'mainBranchFolder'
          persist-credentials: false

      - name: "Install dependencies"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download -R coreruleset/go-ftw "v${{ env.GO_FTW_VERSION }}" \
            -p "ftw_${{ env.GO_FTW_VERSION }}_linux_amd64.tar.gz" -O - | tar -xzvf - ftw

      - name: "Restore Cache"
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.ftw/*.txt
          key: ${{ matrix.language }}_news_${{ matrix.year }}_${{ matrix.size }}-sentences.txt

      - name: "Run tests for language: ${{ matrix.language }}, year: ${{ matrix.year}}, size: ${{ matrix.size }}, paranoia level: ${{ matrix.paranoia_level }}"
        id: quantitative
        continue-on-error: true
        env:
          LANGUAGE: ${{ matrix.language }}
          YEAR: ${{ matrix.year }}
          SIZE: ${{ matrix.size }}
          PARANOIA_LEVEL: ${{ matrix.paranoia_level }}
        run: |
          ./ftw quantitative \
            -L "$LANGUAGE" \
            -y "$YEAR" \
            -s "$SIZE" \
            -P "$PARANOIA_LEVEL" \
            -o json -f new_results.json
          ./ftw quantitative \
            -C ./mainBranchFolder \
            -L "$LANGUAGE" \
            -y "$YEAR" \
            -s "$SIZE" \
            -P "$PARANOIA_LEVEL" \
            -o json -f old_results.json
          echo -e "\n📊 New Results"
          cat new_results.json | jq .
          echo -e "\n📊 Old Results"
          cat old_results.json | jq .

          OLD_FALSE_POSITIVES=$(jq -r '.falsePositives' old_results.json)
          NEW_FALSE_POSITIVES=$(jq -r '.falsePositives' new_results.json)
          NEW_FALSE_POSITIVES_PER_RULE=$(yq e -o csv '.falsePositivesPerRule | to_entries' new_results.json | \
            awk -F',' 'NR==1 { printf "| %-10s | %-10s |\n|---|---|\n", $1, $2 } NR>1 { printf "| %-10s | %-10s |\n", $1, $2 }')
          NEW_TOTAL_TIME=$(jq '.totalTime' new_results.json)
          NEW_COUNT=$(jq '.count' new_results.json)

          echo -e "\n📊 Quantitative test results for language: \`$LANGUAGE\`, year: \`$YEAR\`, size: \`$SIZE\`, paranoia level: \`$PARANOIA_LEVEL\`:" > pr_comment.md
          if [ "$NEW_FALSE_POSITIVES" -gt "$OLD_FALSE_POSITIVES" ]; then
            echo -e " ⚠️ Quantitative testing detected new false positives" >> pr_comment.md
            echo -e "📝 Total false positives: \`$OLD_FALSE_POSITIVES\` -> \`$NEW_FALSE_POSITIVES\`\n" >> pr_comment.md
            echo -e "<details>\n" >> pr_comment.md
            echo -e "" >> pr_comment.md
            echo -e "  <summary>Run details</summary>\n" >> pr_comment.md
            echo -e "Time to run tests: ${NEW_TOTAL_TIME} ms" >> pr_comment.md
            echo -e "Total tests: ${NEW_COUNT}" >> pr_comment.md
            echo -e "False positives per rule:" >> pr_comment.md
            echo -e "${NEW_FALSE_POSITIVES_PER_RULE}\n" >> pr_comment.md
            echo -e "</details>\n<details>\n" >> pr_comment.md
            echo -e "  <summary>Diff details</summary>\n\n\`\`\`\n" >> pr_comment.md
            diff <(jq . old_results.json) <(jq . new_results.json) >> pr_comment.md || true
            echo -e "\n\`\`\`\n</details>" >> pr_comment.md
            echo -e " ⚠️ Manual approval needed" >> pr_comment.md
            exit 1
          else
            echo -e " 🚀 Quantitative testing did not detect new false positives" >> pr_comment.md
          fi

      - name: "Save PR number for comment workflow"
        if: github.event_name == 'pull_request'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "$PR_NUMBER" > pr_number.txt

      - name: "Upload comment artifact"
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: quantitative-comment
          path: |
            pr_comment.md
            pr_number.txt
          retention-days: 1

      - name: "Cache Corpus file"
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.ftw/*.txt
          key: ${{ matrix.language }}_news_${{ matrix.year }}_${{ matrix.size }}-sentences.txt

  manual_approval:
    needs: regression
    if: needs.regression.outputs.test_status != 'success'
    runs-on: ubuntu-latest
    environment: quantitative-testing-approval   # triggers manual approval
    steps:
      - run: |
          echo "Quantitative tests detected new false positives — reviewer approval required"
